name: Auto Update Portfolio Cards

on:
  push:
    paths:
      - "**/*.html"

permissions:
  contents: write

jobs:
  update-index:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate cards
        run: |
          python3 generate_cards.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add index.html

          git diff --cached --quiet || git commit -m "Auto update portfolio cards"

          git push
